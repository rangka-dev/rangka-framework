name: Integration Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    types: [labeled, synchronize, opened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'integration')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rangka
          POSTGRES_PASSWORD: rangka
          POSTGRES_DB: rangka_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rangka"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run integration tests
        run: pnpm test:integration
        env:
          RANGKA_DB_HOST: localhost
          RANGKA_DB_PORT: 5433
          RANGKA_DB_NAME: rangka_test
          RANGKA_DB_USER: rangka
          RANGKA_DB_PASSWORD: rangka
