services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: rangka
      POSTGRES_PASSWORD: rangka
      POSTGRES_DB: rangka_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rangka']
      interval: 2s
      timeout: 5s
      retries: 10
